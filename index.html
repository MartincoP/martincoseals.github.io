            0% {

                opacity: 0;
            }

            15% {

            for (let i = 6; i >= 0; i--) {
                if (count >= thresholds[i]) return i;
            }
            return 0;
        };

            const currentTierIndex = getTierIndex(count, seal.maxSeals);

            const currentTier = TIERS[currentTierIndex];
            return (seal.maxValues * currentTier.percent) / 100;

            const t = Math.floor(bits / 1000000);
            const m = Math.floor((bits % 1000000) / 1000);
            const b = bits % 1000;
            if (t > 0) str += `${t}T `;
            if (m > 0 || (t > 0 && b > 0)) str += `${m}M `;
            if (b > 0) str += `${b}B`;
            return str.trim() || '0 B';
        };

                setUserSeals(nextSeals);
                
                if (result.totalOpeners > 0) {
                    setOpenersOwned(Math.max(0, openersOwned - result.totalOpeners));
                }
                
                alert("Collection successfully updated!");
                setResult(null); // Clear the result after applying
            };

            const calculateOptimal = () => {
                const sealsOfStat = sealDatabase.filter(s => s.statType === selectedStat);

                let simSeals = { ...userSeals };
                let currentStatSum = sealsOfStat.reduce((sum, seal) => sum + calculateCurrentStat(seal, simSeals[seal.name] || 0), 0);

                let shoppingList = [];
                let totalCost = 0;
                let steps = 0;

                while (currentStatSum < targetStat && steps < 500) {
                    steps++;
                    let bestUpgrade = null;
                    let bestEfficiency = Infinity;

                    for (const seal of sealsOfStat) {
                        const price = sealPrices[seal.name];
                        if (!price || price <= 0) continue;

                        const currentCount = simSeals[seal.name] || 0;
                        const currentTierIndex = getTierIndex(currentCount, seal.maxSeals);
                        const nextTierIndex = currentTierIndex + 1;
                        const nextTier = TIERS[nextTierIndex];
                        const thresholds = getTierThresholds(seal.maxSeals);
                        const targetThreshold = thresholds[nextTierIndex];

                        if (!nextTier || targetThreshold > seal.maxSeals) continue;

                        const costToNext = (targetThreshold - currentCount) * price;
                        const currentStatVal = calculateCurrentStat(seal, currentCount);
                        const nextStatVal = seal.tierValues ? seal.tierValues[nextTierIndex] : (seal.maxValues * nextTier.percent) / 100;
                        const statGain = nextStatVal - currentStatVal;

                        if (statGain <= 0) continue;

                        const efficiency = costToNext / statGain;

                        if (efficiency < bestEfficiency) {
                            bestEfficiency = efficiency;
                            bestUpgrade = {
                                seal,
                                targetTier: nextTier,
                                targetThreshold: targetThreshold,
                                sealsToBuy: targetThreshold - currentCount,
                                cost: costToNext,
                                statGain: statGain
                            };
                        }
                    }

                    if (!bestUpgrade) break;

                    simSeals[bestUpgrade.seal.name] = bestUpgrade.targetThreshold;
                    currentStatSum += bestUpgrade.statGain;
                    totalCost += bestUpgrade.cost;

                    const existingItem = shoppingList.find(i => i.name === bestUpgrade.seal.name);
                    if (existingItem) {
                        existingItem.sealsToBuy += bestUpgrade.sealsToBuy;
                        existingItem.cost += bestUpgrade.cost;
                        existingItem.targetTier = bestUpgrade.targetTier.name;
                    } else {
                        shoppingList.push({
                            name: bestUpgrade.seal.name,
                            sealsToBuy: bestUpgrade.sealsToBuy,
                            cost: bestUpgrade.cost,
                            targetTier: bestUpgrade.targetTier.name,
                            price: sealPrices[bestUpgrade.seal.name]
                        });
                    }
                }

                let totalOpenerCost = 0;
                let totalOpeners = 0;
                let remainingOwnedOpeners = openersOwned || 0;

                shoppingList.forEach(item => {
                    item.openersNeeded = Math.ceil(item.sealsToBuy / 50);
                    totalOpeners += item.openersNeeded;

                    if (remainingOwnedOpeners >= item.openersNeeded) {
                        item.openersToBuy = 0;
                        remainingOwnedOpeners -= item.openersNeeded;
                    } else {
                        item.openersToBuy = item.openersNeeded - remainingOwnedOpeners;
                        remainingOwnedOpeners = 0;
                    }

                    item.openerCost = item.openersToBuy * openerPrice;
                    totalOpenerCost += item.openerCost;
                });

                setResult({
                    success: currentStatSum >= targetStat,
                    finalStat: currentStatSum,
                    totalCost,
                    totalOpeners,
                    totalOpenerCost,
                    shoppingList,
                    missingStatOption: currentStatSum < targetStat
                });
            };

            const isPercent = ["CT", "EV", "BL"].includes(selectedStat);

            return (
                <div className="w-full bg-dark-card border border-dark-border rounded-xl flex flex-col min-h-[500px] shadow-lg overflow-hidden animate-[fadeIn_0.3s_ease-out]">
                    <div className="p-6 flex justify-between items-center border-b border-dark-border bg-dark-cardHover/30">
                        <h2 className="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-accent to-yellow-300 flex items-center gap-2">
                            <svg className="w-6 h-6 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            Cost Optimizer
                        </h2>
                    </div>

                    <StatSummary currentStats={currentStats} />

                    <div className="p-6 bg-dark-card/50 border-b border-dark-border">
                        <div className="flex gap-4 items-end flex-wrap">
                            <div className="flex-1 min-w-[200px]">
                                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Stat to Optimize</label>
                                <select
                                    className="w-full bg-dark-bg text-white border border-dark-border rounded-lg px-3 py-2.5 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent font-bold h-[46px]"
                                    value={selectedStat}
                                    onChange={(e) => { setSelectedStat(e.target.value); setResult(null); }}
                                >
                                    {['AT', 'HP', 'DS', 'CT', 'HT', 'DE', 'EV', 'BL'].map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            </div>
                            <div className="flex-1 min-w-[200px]">
                                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Target Value</label>
                                <div className="relative">
                                    <input
                                        type="number"
                                        step="any"
                                        className="w-full bg-dark-bg text-gray-100 border border-dark-border rounded-lg px-3 flex items-center h-[46px] focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent font-mono font-bold"
                                        value={targetStat}
                                        onChange={(e) => { setTargetStat(Number(e.target.value)); setResult(null); }}
                                    />
                                    <span className="absolute right-3 top-2.5 text-slate-500 font-bold">{isPercent ? '%' : ''}</span>
                                </div>
                            </div>
                            <div className="flex-1 min-w-[200px]">
                                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" title="Price per Seal Opener">Opener Price</label>
                                <div className="bg-dark-bg border border-dark-border rounded-lg p-2.5 flex items-center h-[46px]">
                                    <CurrencyInput value={openerPrice} onChange={(val) => { setOpenerPrice(val); setResult(null); }} />
                                </div>
                            </div>
                            <div className="flex-1 min-w-[200px]">
                                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" title="Quantity of Seal Openers you currently own">Openers Owned</label>
                                <div className="relative">
                                    <input
                                        type="number"
                                        min="0"
                                        className="w-full bg-dark-bg text-gray-100 border border-dark-border rounded-lg px-3 flex items-center h-[46px] focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent font-mono font-bold"
                                        value={openersOwned}
                                        onChange={(e) => { setOpenersOwned(parseInt(e.target.value) || 0); setResult(null); }}
                                    />
                                </div>
                            </div>
                        </div>
                        <button
                            onClick={calculateOptimal}
                            className="w-full mt-5 py-3 bg-gradient-to-r from-accent to-yellow-600 hover:from-amber-400 hover:to-yellow-500 text-white font-bold rounded-lg shadow-lg hover:shadow-accent/40 transition-all flex justify-center items-center gap-2"
                        >
                            Calculate Cheapest Path
                        </button>
                    </div>

                    <div className="p-6 flex-1 overflow-y-auto style-scrollbar bg-dark-bg">
                        {!result && (
                            <div className="h-full flex flex-col items-center justify-center text-slate-500 text-center">
                                <svg className="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                                <p>Select your target and click calculate to generate your shopping list.</p>
                                <p className="text-xs mt-2 text-slate-600 font-medium">Note: Make sure your seal prices are inputted first!</p>
                            </div>
                        )}

                        {result && (
                            <div>
                                <div className={`p-4 rounded-lg border ${result.success ? 'bg-green-900/20 border-green-500/30' : 'bg-red-900/20 border-red-500/30'} mb-6`}>
                                    <h3 className={`text-lg font-bold flex items-center gap-2 ${result.success ? 'text-green-400' : 'text-red-400'} mb-2`}>
                                        {result.success ? (
                                            <><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> Target Reached!</>
                                        ) : (
                                            <><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg> Cannot fully reach target</>
                                        )}
                                    </h3>
                                    {result.missingStatOption && (
                                        <p className="text-xs text-red-300/80 mb-3 border-b border-red-500/20 pb-2">We ran out of seal upgrades that have valid prices set. You can only reach this maximum stat.</p>
                                    )}
                                    <div className="flex justify-between text-sm">
                                        <span className="text-slate-300">Final Stat: <span className="text-white font-bold ml-1">+{isPercent ? result.finalStat.toFixed(2) + '%' : Math.round(result.finalStat)}</span></span>
                                        <span className="text-slate-300">Est. Seal Cost: <span className="text-accent font-bold ml-1">{formatCurrency(result.totalCost)}</span></span>
                                    </div>
                                    <div className="flex justify-between text-sm mt-1">
                                        <span className="text-slate-300">Openers Needed: <span className="text-white font-bold ml-1">{result.totalOpeners}</span></span>
                                        <span className="text-slate-300">Est. Opener Cost: <span className="text-yellow-400 font-bold ml-1">{formatCurrency(result.totalOpenerCost)}</span></span>
                                    </div>
                                    <div className="flex justify-end text-sm mt-2 pt-2 border-t border-dark-border border-dashed">
                                        <span className="text-slate-300 font-medium">Grand Total Cost: <span className="text-accent font-bold ml-2 text-base">{formatCurrency(result.totalCost + result.totalOpenerCost)}</span></span>
                                    </div>
                                    {result.shoppingList.length > 0 && (
                                        <div className="mt-4 flex justify-end">
                                            <button onClick={applyPurchases} className="bg-green-600/20 hover:bg-green-500/40 text-green-400 border border-green-500/30 font-bold py-2 px-6 rounded-lg shadow-md transition-colors flex items-center gap-2 text-sm">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                                                Apply Purchase to Collection
                                            </button>
                                        </div>
                                    )}
                                </div>

                                {result.shoppingList.length > 0 && (
                                    <>
                                        <h4 className="text-sm font-bold text-slate-300 uppercase tracking-wider mb-4 pb-2 border-b border-dark-border flex items-center gap-2">
                                            <svg className="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                            Shopping List
                                        </h4>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {result.shoppingList.map((item, i) => (
                                                <div key={i} className="bg-dark-bg p-4 rounded-xl border border-dark-border hover:border-accent/40 transition-colors shadow-sm">
                                                    <div className="flex justify-between items-center mb-2">
                                                        <span className="font-bold text-white max-w-[150px] truncate" title={item.name}>{item.name}</span>
                                                        <span className="text-yellow-400 font-bold text-sm bg-yellow-900/20 px-2 py-0.5 rounded">{formatCurrency(item.cost)}</span>
                                                    </div>
                                                    <div className="flex justify-between items-center text-xs mt-2 pt-2 border-t border-dark-border border-dashed">
                                                        <span className="text-slate-400">Buy <span className="text-white font-bold px-1">{item.sealsToBuy}</span> ➔ {item.targetTier}</span>
                                                        <span className="text-slate-500 font-medium">@ {formatCurrency(item.price)} ea</span>
                                                    </div>
                                                    <div className="flex justify-between items-center text-xs mt-1">
                                                        <span className="text-slate-400">Openers: <span className="text-white font-bold px-1">{item.openersNeeded}</span> {item.openersToBuy < item.openersNeeded && <span className="text-slate-500">(Buy {item.openersToBuy})</span>}</span>
                                                        <span className="text-yellow-600 font-medium">{formatCurrency(item.openerCost)}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        });

        const App = () => {
            const [activeTab, setActiveTab] = useState('database'); // 'database' | 'optimizer'
            const [userSeals, setUserSeals] = useState({});
            const [sealPrices, setSealPrices] = useState({});
            const [openerPrice, setOpenerPrice] = useState(0);
            const [openersOwned, setOpenersOwned] = useState(0);
            const [filterStat, setFilterStat] = useState('ALL');

            const currentStats = useMemo(() => {
                const stats = { AT: 0, CT: 0, HT: 0, HP: 0, DS: 0, DE: 0, BL: 0, EV: 0 };
                sealDatabase.forEach(seal => {
                    const count = userSeals[seal.name] || 0;
                    if (count > 0) {
                        stats[seal.statType] += calculateCurrentStat(seal, count);
                    }
                });
                return stats;
            }, [userSeals, sealDatabase]);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            // Removed mousePos from state for performance optimization

            // Firebase Auth State
            const [user, setUser] = useState(null);
            const [isSyncing, setIsSyncing] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);

            useEffect(() => {
                if (!auth) return;
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    setUser(u);
                    if (u) {
                        setIsAdmin(ADMIN_UIDS.includes(u.uid));
                        try {
                            setIsSyncing(true);
                            const docRef = db.collection('users').doc(u.uid);
                            const docSnap = await docRef.get();
                            if (docSnap.exists) {
                                const data = docSnap.data();
                                if (data.seals) setUserSeals(data.seals);
                                if (data.prices) setSealPrices(data.prices);
                                if (data.openerPrice) setOpenerPrice(data.openerPrice);
                                if (data.openersOwned) setOpenersOwned(data.openersOwned);
                            }
                            setIsSyncing(false);
                        } catch (e) {
                            console.error("Error loading user data from cloud", e);
                            setIsSyncing(false);
                        }
                    }
                });
                return () => unsubscribe();
            }, []);

            const handleLogin = () => {
                if (!auth) return alert("Firebase is not fully configured. Edit index.html to add your keys.");
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider)
                    .catch(e => {
                        console.error("Sign-in failed:", e);
                        if (e.code === 'auth/unauthorized-domain') {
                            alert("Login failed: Your domain (martincoseals.github.io) hasn't been added to your Firebase 'Authorized Domains' list yet! Go to Authentication > Settings in your Firebase console to add it.");
                        } else {
                            alert("Login failed: " + e.message);
                        }
                    });
            };

            const handleLogout = () => {
                if (auth) auth.signOut();
                setUser(null);
                setIsAdmin(false);
            };

            const fetchGlobalPrices = async () => {
                if (!db) return alert("Firebase not configured.");
                const category = window.prompt("Which category to SYNC? (Type 'ALL' for every stat, or 'AT', 'HP', 'CT', etc.)", "ALL");
                if (!category) return;
                const catUpper = category.toUpperCase();

                if (!confirm(`WARNING: This will overwrite your locally saved prices for [${catUpper}] with the current Global Market prices (prices of 0 will be ignored). Are you sure?`)) return;
                try {
                    const docSnap = await db.collection('globalData').doc('marketPrices').get();
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        
                        let nextPrices = {};
                        if (data.prices) {
                            Object.keys(data.prices).forEach(key => {
                                const seal = sealDatabase.find(s => s.name === key);
                                if (catUpper !== 'ALL' && seal && seal.statType !== catUpper) {
                                    return; // Skip if it doesn't match selected category
                                }
                                const incomingPrice = data.prices[key];
                                if (incomingPrice > 0) {
                                    nextPrices[key] = incomingPrice;
                                }
                            });
                            setSealPrices(prev => ({ ...prev, ...nextPrices }));
                        }

                        if (data.openerPrice && catUpper === 'ALL') {
                            setOpenerPrice(data.openerPrice);
                        }
                        alert(`Global market prices loaded for [${catUpper}]!`);
                    } else {
                        alert("No global prices found yet. Admins still need to set them!");
                    }
                } catch (e) {
                    console.error("Failed to fetch global prices", e);
                    alert("Failed to fetch global prices.");
                }
            };

            const publishGlobalPrices = async () => {
                if (!db || !isAdmin) return;
                const category = window.prompt("Which category to PUBLISH? (Type 'ALL' for every stat, or 'AT', 'HP', 'CT', etc.)", "ALL");
                if (!category) return;
                const catUpper = category.toUpperCase();

                if (!confirm(`This will overwrite the global community prices for [${catUpper}] with your current prices. Are you sure?`)) return;
                try {
                    const docSnap = await db.collection('globalData').doc('marketPrices').get();
                    let currentGlobalPrices = {};
                    if (docSnap.exists) {
                        currentGlobalPrices = docSnap.data().prices || {};
                    }

                    let newGlobalPrices = { ...currentGlobalPrices };
                    Object.keys(sealPrices).forEach(key => {
                        const seal = sealDatabase.find(s => s.name === key);
                        if (catUpper !== 'ALL' && seal && seal.statType !== catUpper) {
                            return; 
                        }
                        
                        const myPrice = sealPrices[key];
                        newGlobalPrices[key] = myPrice || 0;
                    });

                    await db.collection('globalData').doc('marketPrices').set({
                        prices: newGlobalPrices,
                        ...(catUpper === 'ALL' && { openerPrice: openerPrice }),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedBy: user.uid
                    }, { merge: true });
                    alert(`Global market prices updated for [${catUpper}]!`);
                } catch (e) {
                    console.error("Failed to publish global prices", e);
                    alert("Failed to publish global prices.");
                }
            };

            useEffect(() => {
                const handleMouseMove = (e) => {
                    document.documentElement.style.setProperty('--mouse-x', `${e.clientX}px`);
                    document.documentElement.style.setProperty('--mouse-y', `${e.clientY}px`);
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            useEffect(() => {
                const savedSeals = localStorage.getItem('dmoSeals');
                const savedPrices = localStorage.getItem('dmoSealPrices');
                const savedOpenerPrice = localStorage.getItem('dmoOpenerPrice');
                const savedOpenersOwned = localStorage.getItem('dmoOpenersOwned');
                if (savedSeals) {
                    try { setUserSeals(JSON.parse(savedSeals)); } catch (e) { }
                }
                if (savedPrices) {
                    try { setSealPrices(JSON.parse(savedPrices)); } catch (e) { }
                }
                if (savedOpenerPrice) {
                    try { setOpenerPrice(JSON.parse(savedOpenerPrice)); } catch (e) { }
                }
                if (savedOpenersOwned) {
                    try { setOpenersOwned(JSON.parse(savedOpenersOwned)); } catch (e) { }
                }
            }, []);

            useEffect(() => {
                const container = document.getElementById('rain-container');
                if (!container) return;

                const createDrop = () => {
                    const drop = document.createElement('div');
                    drop.className = 'rain-drop';

                    const left = Math.random() * 100;
                    const duration = 1.5 + Math.random() * 2.5; // 1.5s to 4s
                    const delay = Math.random() * 2;
                    const sizeMultiplier = 0.5 + Math.random() * 1.5;

                    drop.style.left = `${left}%`;
                    drop.style.animationDuration = `${duration}s`;
                    drop.style.animationDelay = `${delay}s`;
                    drop.style.height = `${80 * sizeMultiplier}px`;
                    drop.style.opacity = '0';

                    container.appendChild(drop);

                    // Clean up after animation finishes
                    setTimeout(() => {
                        if (drop.parentNode === container) {
                            container.removeChild(drop);
                        }
                    }, (duration + delay) * 1000);
                };

                // Create initial burst
                for (let i = 0; i < 15; i++) createDrop();

                // Periodically add more
                const interval = setInterval(createDrop, 400);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                localStorage.setItem('dmoSeals', JSON.stringify(userSeals));
                localStorage.setItem('dmoSealPrices', JSON.stringify(sealPrices));
                localStorage.setItem('dmoOpenerPrice', JSON.stringify(openerPrice));
                localStorage.setItem('dmoOpenersOwned', JSON.stringify(openersOwned));
            }, [userSeals, sealPrices, openerPrice, openersOwned]);

            // Cloud Sync Effect
            useEffect(() => {
                if (!user || !db) return;
                // Don't sync completely empty states immediately on login if we haven't loaded yet
                const timeoutId = setTimeout(async () => {
                    try {
                        setIsSyncing(true);
                        await db.collection('users').doc(user.uid).set({
                            seals: userSeals,
                            prices: sealPrices,
                            openerPrice: openerPrice,
                            openersOwned: openersOwned,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                        setIsSyncing(false);
                    } catch (e) {
                        console.error('Failed to sync to cloud', e);
                        setIsSyncing(false);
                    }
                }, 2500); // debounce 2.5 seconds
                return () => clearTimeout(timeoutId);
            }, [userSeals, sealPrices, openerPrice, openersOwned, user]);

            const handleCountChange = (sealName, newCount) => {
                setUserSeals(prev => ({ ...prev, [sealName]: newCount }));
            };

            const handlePriceChange = (sealName, newPrice) => {
                setSealPrices(prev => ({ ...prev, [sealName]: newPrice }));
            };

            const processedSeals = useMemo(() => {
                let filtered = filterStat === 'ALL'
                    ? sealDatabase
                    : sealDatabase.filter(s => s.statType === filterStat);

                return filtered;
            }, [filterStat]);

            return (
                <div className="min-h-screen bg-[#09090b] text-slate-300 font-sans selection:bg-primary/30 selection:text-white pb-20 relative">
                    {/* Mouse Halo Effect */}
                    <div id="mouse-halo" />

                    <div className="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 relative z-10">
                        {/* Rain Effect Container */}
                        <div id="rain-container" className="fixed inset-0 pointer-events-none z-[-1] overflow-hidden"></div>
                        <SidebarForm
                            isOpen={isSidebarOpen}
                            onClose={() => setIsSidebarOpen(false)}
                            userSeals={userSeals}
                            sealPrices={sealPrices}
                            onCountChange={handleCountChange}
                            onPriceChange={handlePriceChange}
                            sealDatabase={sealDatabase}
                        />

                        {/* Tabs / Header Navigation */}
                        <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-6 border-b border-dark-border pb-1">
                            <div>
                                <h1 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-primary to-blue-300 drop-shadow-sm h-10 w-full mb-1">
                                    DMO Seal Calculator
                                </h1>
                            </div>

                            <div className="flex gap-4 items-center flex-wrap">
                                <div className="flex gap-2 md:mr-4">
                                    <button
                                        onClick={() => setActiveTab('database')}
                                        className={`px-6 py-3 rounded-t-xl font-bold transition-all duration-200 flex items-center gap-2 border-b-2 ${activeTab === 'database' ? 'text-primary bg-dark-card border-primary/80' : 'text-slate-400 border-transparent hover:text-white hover:bg-dark-cardHover/50'}`}
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                                        Database
                                    </button>
                                    <button
                                        onClick={() => setActiveTab('optimizer')}
                                        className={`px-6 py-3 rounded-t-xl font-bold transition-all duration-200 flex items-center gap-2 border-b-2 ${activeTab === 'optimizer' ? 'text-accent bg-dark-card border-accent/80' : 'text-slate-400 border-transparent hover:text-white hover:bg-dark-cardHover/50'}`}
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                        Optimizer
                                    </button>
                                </div>

                                {/* Global Price Controls */}
                                <div className="flex gap-2 items-center">
                                    <button onClick={fetchGlobalPrices} className="flex items-center gap-1.5 bg-blue-600/20 hover:bg-blue-600/40 text-blue-400 border border-blue-500/30 px-3 py-2 rounded-lg font-bold text-[11px] sm:text-xs transition-all whitespace-nowrap">
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                        Sync Global Prices
                                    </button>
                                    {isAdmin && (
                                        <button onClick={publishGlobalPrices} className="flex items-center gap-1.5 bg-accent/20 hover:bg-accent/40 text-yellow-500 border border-yellow-500/30 px-3 py-2 rounded-lg font-bold text-[11px] sm:text-xs transition-all whitespace-nowrap">
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                            [Admin] Publish Prices
                                        </button>
                                    )}
                                </div>

                                {/* Auth Controls */}
                                <div className="md:border-l md:border-dark-border md:pl-4 min-h-[40px] flex items-center">
                                    {user ? (
                                        <div className="flex items-center gap-3">
                                            <div className="relative group flex items-center gap-2">
                                                {user.photoURL && <img src={user.photoURL} alt="Avatar" className="w-8 h-8 rounded-full border border-dark-border/50 shadow-sm" />}
                                                <div className="flex flex-col">
                                                    <span className="text-xs font-bold text-slate-200">{user.displayName || 'Player'}</span>
                                                    <div className="flex items-center">
                                                        <span className="text-[10px] text-slate-500 mr-2 flex items-center gap-1">
                                                            <div className={`w-1.5 h-1.5 rounded-full ${isSyncing ? 'bg-yellow-400 animate-pulse' : 'bg-green-500'}`}></div>
                                                            {isSyncing ? 'Syncing...' : 'Cloud Saved'}
                                                        </span>
                                                        <button onClick={handleLogout} className="text-[10px] font-bold text-red-500 hover:text-red-400 transition-colors">Sign Out</button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <button
                                            onClick={handleLogin}
                                            title="To use Cloud Save, insert your Firebase API Keys in index.html"
                                            className="flex items-center gap-2 bg-white text-slate-900 px-4 py-2 rounded-lg font-bold text-sm shadow-sm hover:shadow-lg hover:bg-slate-100 transition-all border border-transparent hover:border-slate-300"
                                        >
                                            <svg className="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" /><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" /><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" /><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" /></svg>
                                            Sign in / Cloud Save
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>

                        {activeTab === 'database' && (
                            <div className="animate-[fadeIn_0.3s_ease-out]">
                                <StatSummary currentStats={currentStats} />
                                {/* Toolbar */}
                                <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 bg-dark-card p-4 rounded-xl border border-dark-border">
                                    <div className="flex flex-wrap gap-1 w-full md:w-auto bg-dark-bg p-1 rounded-xl shadow-inner border border-dark-border/50">
                                        {filters.map(filter => (
                                            <button
                                                key={filter}
                                                onClick={() => setFilterStat(filter)}
                                                className={`px-4 py-2 rounded-lg text-sm font-bold transition-all duration-200 ${statColors[filter]} ${filterStat === filter
                                                    ? 'bg-dark-cardHover shadow-sm drop-shadow-md opacity-100'
                                                    : 'hover:bg-white/5 opacity-50 hover:opacity-100'
                                                    }`}
                                            >
                                                {filter}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="flex justify-between md:justify-end gap-4 w-full md:w-auto items-center">
                                        <span className={`${statColors[filterStat]} font-bold text-sm whitespace-nowrap drop-shadow-sm`}>
                                            {filterStat} ({processedSeals.length} results)
                                        </span>
                                        <button
                                            onClick={() => setIsSidebarOpen(true)}
                                            className="px-4 py-2 bg-dark-bg text-white border border-dark-border hover:bg-dark-cardHover hover:border-primary/50 rounded-lg text-sm font-bold transition-all duration-200 whitespace-nowrap flex items-center gap-2 shadow-sm"
                                        >
                                            <svg className="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                                            Mass Edit
                                        </button>
                                    </div>
                                </div>

                                {/* Main Grid */}
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6 pb-12">
                                    {processedSeals.map(seal => (
                                        <SealCard
                                            key={seal.name}
                                            seal={seal}
                                            count={userSeals[seal.name] || 0}
                                            price={sealPrices[seal.name] || 0}
                                            onCountChange={handleCountChange}
                                            onPriceChange={handlePriceChange}
                                        />
                                    ))}

                                    {processedSeals.length === 0 && (
                                        <div className="col-span-full py-16 text-center text-slate-500 font-medium border-2 border-dashed border-dark-border rounded-xl">
                                            No seals found for the selected filter.
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'optimizer' && (
                            <OptimizerView
                                userSeals={userSeals}
                                setUserSeals={setUserSeals}
                                sealPrices={sealPrices}
                                sealDatabase={sealDatabase}
                                currentStats={currentStats}
                                openerPrice={openerPrice}
                                setOpenerPrice={setOpenerPrice}
                                openersOwned={openersOwned}
                                setOpenersOwned={setOpenersOwned}
                            />
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
